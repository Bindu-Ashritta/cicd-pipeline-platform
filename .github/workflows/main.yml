  name: CI/CD Pipeline

  on:
    push:
      branches: [ main ]

  jobs:
    checkout:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Checkout stage
          run: echo "Stage 1 Checkout - code pulled from repository"

    build:
      runs-on: ubuntu-latest
      needs: checkout
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '21'
        - name: Build with Maven
          run: mvn -B package --file pom.xml
        - name: Upload JAR artifact
          uses: actions/upload-artifact@v4
          with:
            name: app-jar
            path: target/*.jar

    test:
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '21'
        - name: Run tests
          run: mvn -B test --file pom.xml
        - name: Upload test results
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: test-results
            path: target/surefire-reports/

    ai-review:
      runs-on: ubuntu-latest
      needs: test
      steps:
        - name: AI Review stage
          run: echo "Stage 4 AI Review - will send diff to LLM"

    deploy:
      runs-on: ubuntu-latest
      needs: ai-review
      steps:
        - name: Deploy stage
          run: echo "Stage 5 Deploy - will deploy to Kubernetes"